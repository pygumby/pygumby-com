  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Google Sans', 'Roboto', sans-serif;
      background: #f8f9fa;
      color: #202124;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      text-align: center;
      padding: 2.5rem;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(60,64,67,0.15), 0 4px 16px rgba(60,64,67,0.1);
      width: 100%;
      max-width: 420px;
    }

    .avatar {
      display: block;
      width: 125px;
      height: 125px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 1.125rem;
      box-shadow: 0 0 0 3px #e8eaed;
    }

    .fullname {
      font-size: 1.1rem;
      font-weight: 400;
      color: #80868b;
      margin-bottom: 1.5rem;
    }

    .handle {
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .handle .at {
      color: #bdc1c6;
      font-weight: 400;
    }

    .links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .links a,
    .current-site {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      border: 1px solid #e8eaed;
      font-size: 0.9rem;
    }

    .links a {
      text-decoration: none;
      color: #202124;
      transition: background 0.15s, border-color 0.15s;
    }

    .links a:hover {
      background: #e8f0fe;
      border-color: #d2e3fc;
    }

    .links svg,
    .current-site svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      fill: #5f6368;
    }

    .links svg {
      transition: fill 0.15s;
    }

    .links a:hover svg {
      fill: #4285F4;
    }

    .link-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #80868b;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      width: 3.5rem;
      text-align: left;
      flex-shrink: 0;
    }

    .link-url {
      color: #4285F4;
      flex: 1;
      text-align: left;
    }

    .links a:hover .link-url {
      text-decoration: underline;
    }

    .links a:focus-visible {
      outline: 3px solid #4285F4;
      outline-offset: 2px;
    }

    .current-site {
      border-color: #d2e3fc;
      background: #e8f0fe;
      cursor: default;
    }

    .current-site svg {
      fill: #4285F4;
    }

    .current-site .link-url {
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .links a,
      .current-site {
        min-height: 4rem;
      }
    }

    footer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #bdc1c6;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    footer svg {
      width: 14px;
      height: 14px;
      fill: #bdc1c6;
      flex-shrink: 0;
    }
  </style>
